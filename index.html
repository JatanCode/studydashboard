<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitro Study Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00d4ff;
            --bg-color: #08080a;
            --blob-color: rgba(0, 212, 255, 0.1);
            --font-main: 'Montserrat', sans-serif;
            --font-clock: 'Orbitron', sans-serif;
            --red-alert: #ff003c;
        }

        body.sports-mode {
            --accent: var(--red-alert);
            --bg-color: #0a0000;
            --blob-color: rgba(255, 0, 60, 0.15);
            --border: rgba(255, 0, 60, 0.3);
            animation: red-pulse 2s infinite;
        }

        @keyframes red-pulse {
            0% { box-shadow: inset 0 0 50px rgba(255,0,0,0.1); }
            50% { box-shadow: inset 0 0 100px rgba(255,0,0,0.2); }
            100% { box-shadow: inset 0 0 50px rgba(255,0,0,0.1); }
        }

        body {
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: var(--font-main); color: white; overflow: hidden;
            background: var(--bg-color); transition: background 0.5s ease;
        }

        .ambient-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .blob {
            position: absolute; width: 800px; height: 800px; background: var(--blob-color);
            filter: blur(120px); border-radius: 50%; animation: move 20s infinite alternate;
        }

        @keyframes move { from { transform: translate(-20%, -20%); } to { transform: translate(20%, 20%); } }

        .dashboard {
            display: grid; grid-template-columns: 1.4fr 1fr; gap: 25px;
            width: 95%; max-width: 1200px; height: 550px; z-index: 1;
        }

        .panel {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.2) 100%);
            backdrop-filter: blur(25px); border: 1px solid var(--border);
            border-radius: 50px; padding: 40px; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); transition: 0.5s;
        }

        .gauge-label { font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; opacity: 0.5; font-weight: 800; color: var(--accent); }
        .time-display { font-family: var(--font-clock); font-size: 5rem; font-weight: 900; margin: 10px 0; color: white; }
        
        .countdown-box { margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border); }
        .countdown-val { font-family: var(--font-clock); font-size: 2rem; color: var(--accent); }

        /* --- CUSTOM TOGGLE SWITCH --- */
        .switch {
            position: relative; display: inline-block; width: 45px; height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.1); transition: .4s; border-radius: 24px;
            border: 1px solid var(--border);
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); background-color: #000; }

        .deduction-container {
            display: flex; align-items: center; gap: 10px; margin-top: 15px; font-size: 0.65rem;
        }
        .log-input { 
            background: transparent; border: none; border-bottom: 1px solid var(--border); 
            color: var(--accent); width: 80px; font-size: 0.65rem;
        }
        .minus-input {
            width: 35px !important; padding: 3px !important; font-size: 0.65rem !important; border-radius: 5px !important;
        }
        
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .clear-btn { font-size: 0.5rem; color: var(--red-alert); cursor: pointer; text-decoration: underline; opacity: 0.6; }
        .clear-btn:hover { opacity: 1; }

        .deduction-list {
            margin-top: 5px; max-height: 100px; overflow-y: auto; font-size: 0.6rem;
        }
        .deduction-item {
            display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 6px 0; font-family: var(--font-clock); cursor: pointer;
        }
        .deduction-item:hover { color: var(--red-alert); text-decoration: line-through; }

        .status-badge {
            position: absolute; top: 40px; right: 40px; padding: 5px 15px;
            border-radius: 20px; border: 1px solid var(--accent); font-size: 0.6rem;
            font-weight: 900; letter-spacing: 2px;
        }

        .nav-pills { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.4); padding: 6px; border-radius: 25px; }
        .pill { flex: 1; padding: 12px; cursor: pointer; border-radius: 20px; text-align: center; font-size: 0.75rem; transition: 0.3s; opacity: 0.4; font-weight: 700; }
        .pill.active { background: var(--accent); opacity: 1; color: #000; box-shadow: 0 0 15px var(--accent); }

        .beast-mode-container { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding: 0 10px; font-size: 0.65rem; letter-spacing: 2px; font-weight: 800; }
        
        .tool-display { font-family: var(--font-clock); font-size: 3.8rem; margin-bottom: 25px; color: white; text-align: center; }

        .timer-inputs { display: flex; gap: 8px; margin-bottom: 20px; }
        input { 
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); 
            padding: 12px; border-radius: 12px; color: white; text-align: center; font-family: var(--font-clock);
        }

        .btn-row { display: flex; gap: 12px; }
        button { 
            flex: 1; padding: 18px; border-radius: 18px; border: none; cursor: pointer; 
            font-family: var(--font-main); font-weight: 900; text-transform: uppercase;
            background: rgba(255,255,255,0.05); color: white; transition: 0.3s; font-size: 0.7rem;
        }
        button:hover:not(:disabled) { background: white; color: black; transform: translateY(-2px); }
        button:disabled { opacity: 0.1; cursor: not-allowed; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="ambient-bg">
        <div class="blob"></div>
    </div>

    <div class="dashboard">
        <div class="panel watch-side">
            <div id="status-mode" class="status-badge">SYSTEM READY</div>
            
            <div class="gauge-section">
                <div class="gauge-label">Master Chronometer</div>
                <div class="time-display" id="clock">00:00:00</div>
            </div>

            <div class="countdown-box">
                <div class="gauge-label">Fuel Remaining (Until 11 PM)</div>
                <div class="countdown-val" id="countdown-ist">--:--:--</div>
                
                <div class="deduction-container">
                    <span>Deduct:</span>
                    <input type="number" id="minus-h" class="minus-input" placeholder="H">
                    <input type="number" id="minus-m" class="minus-input" placeholder="M">
                    <input type="text" id="minus-log" class="log-input" placeholder="Work tag...">
                    <label class="switch">
                        <input type="checkbox" id="minus-trigger" onchange="applyDeduction()">
                        <span class="slider"></span>
                    </label>
                </div>
                
                <div class="list-header">
                    <span class="gauge-label" style="font-size: 0.5rem;">Activity Log (Click item to remove)</span>
                    <span class="clear-btn" onclick="clearAllDeductions()">Reset Fuel</span>
                </div>
                <div class="deduction-list" id="log-list"></div>
            </div>
        </div>

        <div class="panel tool-side">
            <div class="nav-pills">
                <div class="pill active" id="sw-pill" onclick="switchTool('sw')">Stopwatch</div>
                <div class="pill" id="tm-pill" onclick="switchTool('tm')">Timer</div>
            </div>

            <div class="beast-mode-container">
                <label>BEAST MODE COMMITTED</label>
                <label class="switch">
                    <input type="checkbox" id="beast-check" onchange="toggleBeastMode()">
                    <span class="slider"></span>
                </label>
            </div>

            <div id="sw-section">
                <div class="tool-display" id="sw-display">00:00:00</div>
                <div class="btn-row">
                    <button onclick="toggleStopwatch()" id="sw-btn" style="background: var(--accent); color: black;">Ignition</button>
                    <button onclick="resetStopwatch()" id="sw-reset">Reset</button>
                </div>
            </div>

            <div id="tm-section" class="hidden">
                <div class="tool-display" id="tm-display">00:00:00</div>
                <div class="timer-inputs" id="tm-inputs-container">
                    <input type="number" id="tm-h" placeholder="HH">
                    <input type="number" id="tm-m" placeholder="MM">
                    <input type="number" id="tm-s" placeholder="SS">
                </div>
                <div class="btn-row">
                    <button onclick="toggleTimer()" id="tm-btn" style="background: var(--accent); color: black;">Start Race</button>
                    <button onclick="addHourToTimer()">+1m</button>
                    <button onclick="resetTimer()" id="tm-reset">Reset</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let beastMode = false;
        let swRunning = false;
        let tmRunning = false;
        let totalDeductionMs = parseInt(localStorage.getItem('totalDeduction')) || 0;
        let logs = JSON.parse(localStorage.getItem('deductionLogsData')) || [];

        window.onload = () => {
            renderLogs();
            const savedBeast = localStorage.getItem('beastMode') === 'true';
            document.getElementById('beast-check').checked = savedBeast;
            toggleBeastMode();
        };

        function renderLogs() {
            const list = document.getElementById('log-list');
            list.innerHTML = logs.map((log, index) => `
                <div class="deduction-item" onclick="removeLog(${index})">
                    <span>${log.tag}</span> 
                    <span>-${log.h}h ${log.m}m</span>
                </div>
            `).join('');
            localStorage.setItem('deductionLogsData', JSON.stringify(logs));
        }

        function applyDeduction() {
            const checkbox = document.getElementById('minus-trigger');
            const hVal = parseInt(document.getElementById('minus-h').value) || 0;
            const mVal = parseInt(document.getElementById('minus-m').value) || 0;
            const tag = document.getElementById('minus-log').value || "Work Log";
            
            if(checkbox.checked && (hVal > 0 || mVal > 0)) {
                const ms = (hVal * 3600 * 1000) + (mVal * 60 * 1000);
                totalDeductionMs += ms;
                localStorage.setItem('totalDeduction', totalDeductionMs);
                
                logs.unshift({ tag, h: hVal, m: mVal, ms });
                renderLogs();

                document.getElementById('minus-h').value = '';
                document.getElementById('minus-m').value = '';
                document.getElementById('minus-log').value = '';
                setTimeout(() => { checkbox.checked = false; }, 600);
                updateSystem();
            } else {
                setTimeout(() => { checkbox.checked = false; }, 300);
            }
        }

        function removeLog(index) {
            totalDeductionMs -= logs[index].ms;
            logs.splice(index, 1);
            localStorage.setItem('totalDeduction', totalDeductionMs);
            renderLogs();
            updateSystem();
        }

        function clearAllDeductions() {
            if(confirm("Flush all deduction data and reset Fuel?")) {
                totalDeductionMs = 0;
                logs = [];
                localStorage.removeItem('totalDeduction');
                localStorage.removeItem('deductionLogsData');
                renderLogs();
                updateSystem();
            }
        }

        function updateSystem() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];

            const hrs = now.getHours();
            const statusBox = document.getElementById('status-mode');
            if (hrs >= 23 || hrs < 9) {
                statusBox.innerText = "SLEEP MODE";
                statusBox.style.borderColor = "#555";
            } else {
                statusBox.innerText = "STUDY MODE";
                statusBox.style.borderColor = "var(--accent)";
            }

            let target = new Date();
            target.setHours(23, 0, 0, 0);
            if (now > target) target.setDate(target.getDate() + 1);
            
            let diff = (target - now) - totalDeductionMs;
            if (diff < 0) diff = 0;

            let h = Math.floor(diff / 3600000).toString().padStart(2, '0');
            let m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            let s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('countdown-ist').innerText = `${h}:${m}:${s}`;
        }
        
        setInterval(updateSystem, 1000);
        updateSystem();

        function toggleBeastMode() {
            beastMode = document.getElementById('beast-check').checked;
            localStorage.setItem('beastMode', beastMode);
            document.getElementById('sw-reset').disabled = beastMode;
            document.getElementById('tm-reset').disabled = beastMode;
        }

        function switchTool(type) {
            document.getElementById('sw-section').classList.toggle('hidden', type !== 'sw');
            document.getElementById('tm-section').classList.toggle('hidden', type !== 'tm');
            document.getElementById('sw-pill').classList.toggle('active', type === 'sw');
            document.getElementById('tm-pill').classList.toggle('active', type === 'tm');
        }

        // --- STOPWATCH & TIMER ---
        let swTime = 0, swInterval;
        function toggleStopwatch() {
            const btn = document.getElementById('sw-btn');
            if(!swRunning) {
                btn.innerText = "Cut Engine";
                swRunning = true; document.body.classList.add('sports-mode');
                swInterval = setInterval(() => {
                    swTime++;
                    let h = Math.floor(swTime/3600).toString().padStart(2,'0');
                    let m = Math.floor((swTime%3600)/60).toString().padStart(2,'0');
                    let s = (swTime%60).toString().padStart(2,'0');
                    document.getElementById('sw-display').innerText = `${h}:${m}:${s}`;
                }, 1000);
            } else {
                btn.innerText = "Ignition";
                swRunning = false; clearInterval(swInterval);
                if(!tmRunning) document.body.classList.remove('sports-mode');
            }
        }
        function resetStopwatch() {
            if(beastMode) return;
            clearInterval(swInterval); swTime = 0; swRunning = false;
            document.getElementById('sw-display').innerText = "00:00:00";
            document.getElementById('sw-btn').innerText = "Ignition";
            if(!tmRunning) document.body.classList.remove('sports-mode');
        }

        let tmInterval, timeLeft = 0;
        function addHourToTimer() { timeLeft += 3600; updateTimerDisplay(); }
        function updateTimerDisplay() {
            let hh = Math.floor(timeLeft/3600).toString().padStart(2,'0');
            let mm = Math.floor((timeLeft%3600)/60).toString().padStart(2,'0');
            let ss = (timeLeft%60).toString().padStart(2,'0');
            document.getElementById('tm-display').innerText = `${hh}:${mm}:${ss}`;
        }
        function toggleTimer() {
            const btn = document.getElementById('tm-btn');
            if(!tmRunning) {
                if(timeLeft <= 0) {
                    const h = parseInt(document.getElementById('tm-h').value) || 0;
                    const m = parseInt(document.getElementById('tm-m').value) || 0;
                    const s = parseInt(document.getElementById('tm-s').value) || 0;
                    timeLeft = (h * 3600) + (m * 60) + s;
                }
                if(timeLeft <= 0) return;
                btn.innerText = "Pause Race";
                tmRunning = true; document.body.classList.add('sports-mode');
                document.getElementById('tm-inputs-container').style.opacity = "0.2";
                tmInterval = setInterval(() => {
                    if(timeLeft <= 0) {
                        clearInterval(tmInterval); tmRunning = false;
                        if(!swRunning) document.body.classList.remove('sports-mode');
                        alert("GOAL REACHED!"); resetTimer(); return;
                    }
                    timeLeft--; updateTimerDisplay();
                }, 1000);
            } else {
                btn.innerText = "Resume Race";
                tmRunning = false; clearInterval(tmInterval);
                if(!swRunning) document.body.classList.remove('sports-mode');
            }
        }
        function resetTimer() {
            if(beastMode && timeLeft > 0) return; 
            clearInterval(tmInterval); timeLeft = 0; tmRunning = false;
            document.getElementById('tm-display').innerText = "00:00:00";
            document.getElementById('tm-btn').innerText = "Start Race";
            document.getElementById('tm-inputs-container').style.opacity = "1";
            if(!swRunning) document.body.classList.remove('sports-mode');
        }
    </script>
</body>
</html>
